<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{name}} — Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; }
    #messages { flex: 1; overflow-y: auto; padding: 1rem; }
    .msg { padding: 0.5rem 1rem; margin: 0.25rem 0; background: white; border-radius: 8px; max-width: 70%; }
    .msg.self { margin-left: auto; background: #0066ff; color: white; }
    #controls { display: flex; gap: 0.5rem; padding: 1rem; background: white; border-top: 1px solid #ddd; }
    #controls input { flex: 1; padding: 0.75rem; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
    #controls button { padding: 0.75rem 1.5rem; background: #0066ff; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; }
    #room { padding: 0.75rem 1rem; background: white; border-bottom: 1px solid #ddd; display: flex; align-items: center; gap: 0.5rem; }
    #room input { padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px; }
    #notifications { position: fixed; top: 1rem; right: 1rem; z-index: 10; }
    .notification { padding: 0.75rem 1rem; background: #333; color: white; border-radius: 8px; margin-bottom: 0.5rem; animation: fadeout 3s forwards; }
    @keyframes fadeout { 0% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; } }
  </style>
</head>
<body>
  <div id="notifications"></div>
  <div id="room">
    <label>Room:</label>
    <input id="roomInput" value="general" />
    <button onclick="joinRoom()">Join</button>
    <span id="status" style="margin-left:auto; color: #999;">disconnected</span>
  </div>
  <div id="messages"></div>
  <div id="controls">
    <input id="input" placeholder="Type a message..." onkeydown="if(event.key==='Enter')send()" />
    <button onclick="send()">Send</button>
  </div>
  <script>
    let ws
    let room = "general"
    const userId = Math.random().toString(36).slice(2, 8)

    const connect = () => {
      ws = new WebSocket(`ws://${location.host}/ws?room=${room}&user=${userId}`)
      ws.onopen = () => { document.getElementById("status").textContent = "connected" }
      ws.onclose = () => {
        document.getElementById("status").textContent = "disconnected"
        setTimeout(connect, 2000)
      }
      ws.onmessage = (e) => {
        const data = JSON.parse(e.data)
        addMessage(data.user, data.text, data.user === userId)
      }
    }

    const send = () => {
      const input = document.getElementById("input")
      if (input.value.trim() && ws?.readyState === 1) {
        ws.send(JSON.stringify({ text: input.value.trim() }))
        input.value = ""
      }
    }

    const joinRoom = () => {
      room = document.getElementById("roomInput").value || "general"
      document.getElementById("messages").innerHTML = ""
      ws?.close()
      connect()
    }

    const addMessage = (user, text, self) => {
      const el = document.createElement("div")
      el.className = self ? "msg self" : "msg"
      el.textContent = self ? text : `${user}: ${text}`
      document.getElementById("messages").appendChild(el)
      el.scrollIntoView()
    }

    // SSE notifications
    const events = new EventSource("/events/notifications")
    events.onmessage = (e) => {
      const el = document.createElement("div")
      el.className = "notification"
      el.textContent = e.data
      document.getElementById("notifications").appendChild(el)
      setTimeout(() => el.remove(), 3500)
    }

    connect()
  </script>
</body>
</html>
