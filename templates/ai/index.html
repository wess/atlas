<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{name}} - AI App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0f0f0f; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
    header { padding: 12px 20px; background: #1a1a1a; border-bottom: 1px solid #2a2a2a; display: flex; align-items: center; gap: 16px; }
    header h1 { font-size: 18px; font-weight: 600; color: #fff; }
    .tabs { display: flex; gap: 4px; }
    .tab { padding: 6px 14px; border-radius: 6px; border: none; background: transparent; color: #888; cursor: pointer; font-size: 13px; }
    .tab.active { background: #2a2a2a; color: #fff; }
    .tab:hover { color: #ccc; }
    main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    .panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .panel.active { display: flex; }
    .messages { flex: 1; overflow-y: auto; padding: 20px; }
    .message { max-width: 720px; margin: 0 auto 16px; padding: 12px 16px; border-radius: 8px; line-height: 1.5; white-space: pre-wrap; }
    .message.user { background: #1e3a5f; margin-left: auto; }
    .message.assistant { background: #1a1a1a; }
    .message.system { background: #2a2a1a; font-size: 13px; color: #aaa; }
    .input-area { padding: 16px 20px; background: #1a1a1a; border-top: 1px solid #2a2a2a; }
    .input-row { max-width: 720px; margin: 0 auto; display: flex; gap: 8px; }
    .input-row input, .input-row textarea { flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid #333; background: #0f0f0f; color: #e0e0e0; font-size: 14px; font-family: inherit; resize: none; }
    .input-row button { padding: 10px 20px; border-radius: 8px; border: none; background: #3b82f6; color: #fff; font-size: 14px; cursor: pointer; }
    .input-row button:hover { background: #2563eb; }
    .input-row button:disabled { opacity: 0.5; cursor: not-allowed; }
    .results { flex: 1; overflow-y: auto; padding: 20px; }
    .result-card { max-width: 720px; margin: 0 auto 12px; padding: 14px 16px; background: #1a1a1a; border-radius: 8px; }
    .result-card h3 { font-size: 14px; color: #3b82f6; margin-bottom: 6px; }
    .result-card p { font-size: 13px; line-height: 1.5; color: #ccc; }
    .result-card .score { font-size: 12px; color: #666; margin-top: 4px; }
    .source { font-size: 12px; color: #888; background: #222; padding: 8px; border-radius: 4px; margin-top: 6px; }
    .tool-call { font-size: 12px; color: #a78bfa; background: #1a1a2e; padding: 8px; border-radius: 4px; margin-top: 6px; }
    .doc-form { max-width: 720px; margin: 20px auto; display: flex; flex-direction: column; gap: 10px; }
    .doc-form input, .doc-form textarea { padding: 10px 14px; border-radius: 8px; border: 1px solid #333; background: #0f0f0f; color: #e0e0e0; font-size: 14px; font-family: inherit; }
    .doc-form textarea { min-height: 120px; resize: vertical; }
    .doc-list { max-width: 720px; margin: 0 auto; }
    .doc-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: #1a1a1a; border-radius: 8px; margin-bottom: 8px; }
    .doc-item span { font-size: 14px; }
    .doc-item button { padding: 4px 10px; border-radius: 4px; border: none; background: #dc2626; color: #fff; font-size: 12px; cursor: pointer; }
    .status { font-size: 12px; color: #666; text-align: center; padding: 8px; }
  </style>
</head>
<body>
  <header>
    <h1>{{name}}</h1>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('chat')">Chat</button>
      <button class="tab" onclick="switchTab('rag')">RAG</button>
      <button class="tab" onclick="switchTab('agent')">Agent</button>
      <button class="tab" onclick="switchTab('documents')">Documents</button>
    </div>
  </header>

  <main>
    <!-- Chat Panel -->
    <div id="panel-chat" class="panel active">
      <div id="chat-messages" class="messages"></div>
      <div class="input-area">
        <div class="input-row">
          <input type="text" id="chat-input" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendChat()" />
          <button id="chat-send" onclick="sendChat()">Send</button>
        </div>
      </div>
    </div>

    <!-- RAG Panel -->
    <div id="panel-rag" class="panel">
      <div id="rag-results" class="results"></div>
      <div class="input-area">
        <div class="input-row">
          <input type="text" id="rag-input" placeholder="Ask a question about your documents..." onkeydown="if(event.key==='Enter')askRag()" />
          <button id="rag-send" onclick="askRag()">Ask</button>
        </div>
      </div>
    </div>

    <!-- Agent Panel -->
    <div id="panel-agent" class="panel">
      <div id="agent-results" class="results"></div>
      <div class="input-area">
        <div class="input-row">
          <input type="text" id="agent-input" placeholder="Ask the agent something..." onkeydown="if(event.key==='Enter')runAgent()" />
          <button id="agent-send" onclick="runAgent()">Run</button>
        </div>
      </div>
    </div>

    <!-- Documents Panel -->
    <div id="panel-documents" class="panel">
      <div class="results">
        <div class="doc-form">
          <input type="text" id="doc-title" placeholder="Document title" />
          <textarea id="doc-content" placeholder="Paste document text here..."></textarea>
          <button class="tab" style="background:#3b82f6;color:#fff;padding:10px;border-radius:8px;cursor:pointer;" onclick="uploadDocument()">Upload &amp; Index</button>
        </div>
        <div id="doc-list" class="doc-list"></div>
      </div>
    </div>
  </main>

  <script>
    let conversationId = null

    function switchTab(name) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'))
      document.querySelector(`#panel-${name}`).classList.add('active')
      event.target.classList.add('active')
      if (name === 'documents') loadDocuments()
    }

    async function sendChat() {
      const input = document.getElementById('chat-input')
      const message = input.value.trim()
      if (!message) return
      input.value = ''

      const messagesEl = document.getElementById('chat-messages')
      messagesEl.innerHTML += `<div class="message user">${esc(message)}</div>`

      const assistantEl = document.createElement('div')
      assistantEl.className = 'message assistant'
      messagesEl.appendChild(assistantEl)
      messagesEl.scrollTop = messagesEl.scrollHeight

      document.getElementById('chat-send').disabled = true

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, conversationId }),
        })

        const reader = res.body.getReader()
        const decoder = new TextDecoder()
        let buffer = ''

        while (true) {
          const { done, value } = await reader.read()
          if (done) break
          buffer += decoder.decode(value, { stream: true })
          const lines = buffer.split('\n')
          buffer = lines.pop()
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue
            const data = line.slice(6)
            if (data === '[DONE]') continue
            try {
              const chunk = JSON.parse(data)
              if (chunk.type === 'text' && chunk.content) {
                assistantEl.textContent += chunk.content
                messagesEl.scrollTop = messagesEl.scrollHeight
              }
            } catch {}
          }
        }
      } catch (err) {
        assistantEl.textContent = 'Error: ' + err.message
      }

      document.getElementById('chat-send').disabled = false
    }

    async function askRag() {
      const input = document.getElementById('rag-input')
      const question = input.value.trim()
      if (!question) return
      input.value = ''

      const resultsEl = document.getElementById('rag-results')
      resultsEl.innerHTML += `<div class="message user">${esc(question)}</div>`
      document.getElementById('rag-send').disabled = true

      try {
        const res = await fetch('/api/rag', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question }),
        })
        const data = await res.json()

        let html = `<div class="result-card"><p>${esc(data.answer)}</p>`
        if (data.sources && data.sources.length > 0) {
          html += '<div style="margin-top:10px;font-size:12px;color:#888;">Sources:</div>'
          for (const s of data.sources) {
            html += `<div class="source">${esc(s.text.slice(0, 200))}... <span class="score">(score: ${s.score.toFixed(3)})</span></div>`
          }
        }
        html += '</div>'
        resultsEl.innerHTML += html
      } catch (err) {
        resultsEl.innerHTML += `<div class="result-card"><p>Error: ${esc(err.message)}</p></div>`
      }

      document.getElementById('rag-send').disabled = false
      resultsEl.scrollTop = resultsEl.scrollHeight
    }

    async function runAgent() {
      const input = document.getElementById('agent-input')
      const message = input.value.trim()
      if (!message) return
      input.value = ''

      const resultsEl = document.getElementById('agent-results')
      resultsEl.innerHTML += `<div class="message user">${esc(message)}</div>`
      document.getElementById('agent-send').disabled = true

      try {
        const res = await fetch('/api/agent', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message }),
        })
        const data = await res.json()

        let html = `<div class="result-card"><p>${esc(data.response)}</p>`
        if (data.toolCalls && data.toolCalls.length > 0) {
          html += '<div style="margin-top:10px;font-size:12px;color:#a78bfa;">Tool calls:</div>'
          for (const tc of data.toolCalls) {
            html += `<div class="tool-call">${esc(tc.name)}(${esc(JSON.stringify(tc.arguments))})</div>`
          }
        }
        html += `<div class="score">Iterations: ${data.iterations}</div></div>`
        resultsEl.innerHTML += html
      } catch (err) {
        resultsEl.innerHTML += `<div class="result-card"><p>Error: ${esc(err.message)}</p></div>`
      }

      document.getElementById('agent-send').disabled = false
      resultsEl.scrollTop = resultsEl.scrollHeight
    }

    async function uploadDocument() {
      const title = document.getElementById('doc-title').value.trim()
      const content = document.getElementById('doc-content').value.trim()
      if (!title || !content) return alert('Title and content are required')

      try {
        const res = await fetch('/api/documents', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, content }),
        })
        if (!res.ok) throw new Error('Upload failed')
        document.getElementById('doc-title').value = ''
        document.getElementById('doc-content').value = ''
        loadDocuments()
      } catch (err) {
        alert('Error: ' + err.message)
      }
    }

    async function loadDocuments() {
      try {
        const res = await fetch('/api/documents')
        const docs = await res.json()
        const listEl = document.getElementById('doc-list')
        listEl.innerHTML = docs.map(d =>
          `<div class="doc-item"><span>${esc(d.title)}</span><button onclick="deleteDoc(${d.id})">Delete</button></div>`
        ).join('')
      } catch {}
    }

    async function deleteDoc(id) {
      await fetch(`/api/documents/${id}`, { method: 'DELETE' })
      loadDocuments()
    }

    function esc(s) {
      const d = document.createElement('div')
      d.textContent = s
      return d.innerHTML
    }
  </script>
</body>
</html>
